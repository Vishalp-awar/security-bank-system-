name: Banking App CI/CD

on:
  push:
    branches: [ "main", "dev" ] # Runs on both branches
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Services for internal GitHub testing
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.TEST_DB_NAME }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        env:
          # These values match the 'services' block above
          DB_URL: jdbc:mysql://localhost:3306/${{ secrets.TEST_DB_NAME }}
          DB_USER: ${{ secrets.TEST_DB_USER }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Dynamic Tagging for professional version control
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/secure-bank:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/secure-bank:build-${{ github.run_number }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/secure-bank:sha-${{ github.sha }}