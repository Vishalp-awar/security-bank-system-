name: Banking App CI/CD

on:
  push:
    branches: [ "main" ] # Runs every time you push code to the main branch

jobs:
  build-and-test:
    runs-on: ubuntu-latest # A temporary computer GitHub gives you for free

    steps:
      - name: Copy Code
        uses: actions/checkout@v4 # Copies your code onto the temporary computer

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Run JUnit Tests
        run: mvn clean verify # Compiles code and runs your tests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: your-username/secure-bank:latest # Change 'your-username' to your Docker Hub name