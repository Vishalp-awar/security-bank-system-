services:
  # 1. The Java Banking Application
  banking-app:
    # Uses your Docker Hub username from the .env file
    image: ${DOCKER_HUB_USERNAME}/secure-bank:latest
    container_name: banking-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - SPRING_USERNAME=${SPRING_USERNAME}
      - SPRING_PASSWORD=${SPRING_PASSWORD}
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
    networks:
      - bank-network

  # 2. The MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=admin123
      - MYSQL_DATABASE=securebank
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 10s
    networks:
      - bank-network

  # 3. The Redis Cache
  redis-cache:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - bank-network

# Networks allow the containers to talk to each other using their names
networks:
  bank-network:
    driver: bridge